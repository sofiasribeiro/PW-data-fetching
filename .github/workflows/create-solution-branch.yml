name: Create solution branch

# This workflow creates or re-creates the `solution` branch from the main branch,
# replacing the four stubbed data-layer files with the fully implemented versions
# stored in the `.solution/` directory.
#
# Runs automatically when code is pushed to main, and can also be triggered manually.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-solution-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or reset solution branch from main
        run: |
          # Start the solution branch fresh from the current main state
          git checkout -B solution

      - name: Apply solution data-layer files
        run: |
          cp .solution/movieApi.js   src/services/movieApi.js
          cp .solution/store.js      src/store.js
          cp .solution/SearchPage.jsx   src/features/search/SearchPage.jsx
          cp .solution/WatchlistPage.jsx src/features/watchlist/WatchlistPage.jsx

      - name: Remove .solution helper directory from the solution branch
        run: |
          rm -rf .solution
          # Also remove this workflow so the solution branch stays clean
          rm -f .github/workflows/create-solution-branch.yml

      - name: Commit solution changes
        run: |
          git add -A
          git commit -m "solution: fully implemented RTK Query data layer

          Auto-generated by create-solution-branch.yml.
          The four data-layer files are fully wired:
          - src/services/movieApi.js
          - src/store.js
          - src/features/search/SearchPage.jsx
          - src/features/watchlist/WatchlistPage.jsx"

      - name: Push solution branch
        run: |
          git push origin solution --force
